<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <title>MMC 熱帶氣旋預報GIS（測試版）</title>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://unpkg.com/leaflet/dist/leaflet.css" rel="stylesheet"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        :root { --panel-bg: rgba(255, 255, 255, 0.95); --accent-color: #2c3e50; }
        body { margin: 0; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; overflow: hidden; }

        .header {
            position: absolute; top: 0; left: 0; right: 0; height: 50px;
            background: var(--accent-color); color: white;
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            z-index: 1100; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .img-btn {
            background: #e67e22; color: white; border: none; padding: 6px 12px;
            border-radius: 4px; cursor: pointer; font-size: 13px; margin-left: 10px;
            font-weight: bold; transition: background 0.3s;
        }
        .img-btn:hover { background: #d35400; }

        #map-type-selector {
            position: absolute; top: 60px; right: 10px; z-index: 1005;
            background: white; border: 1px solid #ccc; padding: 8px; border-radius: 4px;
            font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); outline: none; width: 130px; font-weight: bold;
        }

        .weather-layer-selector {
            position: absolute; top: 105px; right: 10px; z-index: 1005;
            background: #3498db; color: white; border: none; padding: 8px; border-radius: 4px;
            font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer;
            font-size: 14px; width: 130px; outline: none;
        }

        #tc-selector { background: #34495e; color: white; border: 1px solid #7f8c8d; padding: 4px 8px; border-radius: 4px; cursor: pointer; }

        #mapid { position: absolute; top: 50px; left: 0; bottom: 0; right: 0; background: #aad3df; }
        .leaflet-top.leaflet-left { top: 60px; }

        .professional-legend {
            position: absolute; bottom: 20px; right: 10px;
            background: var(--panel-bg); padding: 12px; border-radius: 8px;
            z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.15); border: 1px solid #ddd; width: 210px;
        }
        .legend-title { font-weight: bold; border-bottom: 2px solid #eee; margin-bottom: 8px; padding-bottom: 4px; font-size: 13px; color: #333; }
        .legend-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; font-size: 11px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #444; flex-shrink: 0; }
        .line { width: 25px; height: 3px; flex-shrink: 0; }
        .box { width: 14px; height: 14px; border: 1px dashed #e67e22; background: rgba(241,196,15,0.15); flex-shrink: 0; }

        #img-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out;
        }
        #img-overlay img { max-width: 95%; max-height: 90%; border: 3px solid white; border-radius: 5px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
        .circle-label { background: none !important; border: none !important; box-shadow: none !important; }

        .radar-ui {
            position: absolute; bottom: 20px; left: 10px; background: var(--panel-bg);
            padding: 12px; border-radius: 8px; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.15);
            border: 1px solid #ddd; width: 260px; display: none;
        }
        .radar-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        #timestamp { font-size: 16px; font-weight: 600; color: #3498db; }
        .buttons { display: flex; gap: 6px; }
        .buttons button { width: 34px; height: 32px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 15px; }
        
        #radar-legend-subpanel { display: block; }
        .radar-legend-bar {
            height: 10px; width: 100%; border-radius: 2px; margin-bottom: 5px;
            background: linear-gradient(to right, #827b69 0%, #ded097 19%, #88ddee 20%, #005588 46%, #ffee00 46.5%, #ff8100 59%, #ff4400 60%, #5d0000 72%, #ffaaff 73.5%, #ff4eff 86%, #ffffff 86.5%, #ffffff 99%, #00ff00 100%);
        }
        .radar-legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: #666; font-weight: bold; }

        @media screen and (max-width: 768px) {
            .header b { font-size: 13px; }
            .radar-ui { bottom: 220px; width: 240px; padding: 10px; }
            .professional-legend { width: calc(100% - 40px); left: 10px; right: 10px; bottom: 15px; padding: 10px; max-height: 180px; overflow-y: auto; }
            .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 10px; }
            .legend-title { font-size: 12px; grid-column: span 2; margin-top: 5px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div><b>🌀 MMC TC-GIS（測試版）</b></div>
    <div style="display: flex; align-items: center;">
        <select id="tc-selector" onchange="init()">
            <option value="all" selected>所有熱帶氣旋</option>
            <option value="A">海神</option>
            <!--<option value="B">-</option>-->
        </select>
        <button id="forecast-btn" class="img-btn" style="display: none;" onclick="toggleForecastImg()">預報路徑圖</button>
        <!-- 新增：詳細預報PDF按鈕 -->
        <button id="tcp-btn" class="img-btn" style="display: none; background: #27ae60;" onclick="toggleTCPdf()">詳細預報PDF</button>
    </div>
</div>

<select id="map-type-selector" onchange="changeMapType(this.value)">
    <option value="light">淺色地圖</option>
    <option value="dark">深色地圖</option>
    <option value="satellite">衛星地圖</option>
</select>

<select id="weather-layer-selector" class="weather-layer-selector" onchange="handleWeatherLayerChange(this.value)">
    <option value="none">純地圖</option>
    <option value="radar">雷達圖像</option>
    <option value="satellite">衛星雲圖</option>
</select>

<div id="mapid"></div>

<div id="img-overlay" onclick="this.style.display='none'">
    <span class="close-btn">&times;</span>
    <img id="forecast-img-src" src="" alt="圖片版預報加載中...">
</div>

<div id="radar-ui-container" class="radar-ui">
    <div class="radar-controls">
        <span id="timestamp">--:--</span>
        <div class="buttons">
            <button onclick="stop(); showFrame(animationPosition - 1);">‹</button>
            <button id="playBtn" onclick="playStop();">▶</button>
            <button onclick="stop(); showFrame(animationPosition + 1);">›</button>
        </div>
    </div>
    <div id="radar-legend-subpanel">
        <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold; margin-bottom:5px;">
            <span>雷達圖例</span><span>dBZ</span>
        </div>
        <div class="radar-legend-bar"></div>
        <div class="radar-legend-labels">
            <span>5</span><span>15</span><span>25</span><span>35</span><span>45</span><span>55</span><span>65</span><span>75</span>
        </div>
    </div>
</div>

<div class="professional-legend">
    <div class="legend-grid">
        <div class="legend-title">路徑圖例</div>
        <div class="legend-row"><div class="dot" style="background:#fff; border: 2.5px solid #000; width:12px; height:12px;"></div> <b>實時位置</b></div>
        <div class="legend-row"><div class="line" style="background: #32CD32;"></div> 過去路徑</div>
        <div class="legend-row"><div class="line" style="border-top: 3px dashed #3498db;"></div> 預報路徑</div>
        <div class="legend-row"><div class="box"></div> 70% 誤差帶</div>
        
        <div class="legend-title">強度等級</div>
        <div class="legend-row"><div class="dot" style="background:#dcdcdc;"></div> LPA 低壓區</div>
        <div class="legend-row"><div class="dot" style="background:#eee8aa;"></div> TD 熱帶低氣壓</div>
        <div class="legend-row"><div class="dot" style="background:#3498db;"></div> TS 熱帶風暴</div>
        <div class="legend-row"><div class="dot" style="background:#2ecc71;"></div> STS 強烈熱帶風暴</div>
        <div class="legend-row"><div class="dot" style="background:#ffa200f6;"></div> TY 颱風</div>
        <div class="legend-row"><div class="dot" style="background:#ff0000;"></div> STY 強颱風</div>
        <div class="legend-row"><div class="dot" style="background:#9b59b6;"></div> SUTY 超強颱風</div>
    </div>
</div>

<script>

// 所有熱帶氣旋ID列表，新增氣旋時在這裡補充即可
const TC_LIST = ['A', 'B'];

const baseLayers = {
    light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'),
    dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'),
    satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
};

function changeMapType(type) {
    Object.values(baseLayers).forEach(layer => map.removeLayer(layer));
    baseLayers[type].addTo(map);
}

const intensityColors = { "LPA": "#dcdcdc", "EX": "#dcdcdc", "TD": "#eee8aa", "TS": "#3498db", "STS": "#2ecc71", "TY": "#ffa200f6", "STY": "#ff0000", "SUTY": "#9b59b6", "default": "#666" };
const intensityNames = { "LPA": "低壓區", "TD": "熱帶低氣壓", "TS": "熱帶風暴", "STS": "強烈熱帶風暴", "TY": "颱風", "STY": "強颱風", "SUTY": "超強颱風", "EX": "溫帶氣旋" };
const MACAO_COORDS = [22.17, 113.55]; 
const ALERT_CIRCLES = [ { r: 100, color: "#A0A0A0", opacity: 0.3 }, { r: 200, color: "#808080", opacity: 0.4 }, { r: 400, color: "#808080", opacity: 0.5 }, { r: 600, color: "#A0A0A0", opacity: 0.6 }, { r: 800, color: "#FF4D4D", opacity: 0.7 } ];

var map = L.map('mapid', { zoomControl: false }).setView([18.0, 135.0], 5);
L.control.zoom({ position: 'topleft' }).addTo(map);
baseLayers.light.addTo(map);
let trackLayer = L.layerGroup().addTo(map);

function toggleForecastImg() {
    const target = document.getElementById('tc-selector').value;
    const overlay = document.getElementById('img-overlay');
    const img = document.getElementById('forecast-img-src');
    // 全部模式下預設顯示第一個氣旋的預報圖，可按需調整
    const imgId = target === 'all' ? TC_LIST[0] : target;
    img.src = `TC_forecast_${imgId}.png?t=${new Date().getTime()}`;
    overlay.style.display = 'flex';
}

// 新增：打開詳細預報PDF
function toggleTCPdf() {
    const target = document.getElementById('tc-selector').value;
    if (target === 'all') return;
    // 新窗口打開對應氣旋的TCP預報PDF，自帶時間戳避免緩存
    window.open(`TCP_${target}.pdf?t=${new Date().getTime()}`, '_blank');
}

function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
    return lines.slice(1).map(line => {
        const values = line.split(',');
        let obj = {};
        headers.forEach((h, i) => {
            let val = values[i] ? values[i].trim() : "";
            if(['lat', 'lng', 'lon', 'f_time', 'wind', 'minimum central pressure'].includes(h)) val = parseFloat(val);
            obj[h] = val;
        });
        if (obj.lon && !obj.lng) obj.lng = obj.lon;
        return obj;
    });
}

function getSegmentSector(p1, r1, p2, r2) {
    const bearing = turf.bearing(p1, p2);
    const p1_l = turf.destination(p1, r1, bearing - 90, {units: 'kilometers'});
    const p1_r = turf.destination(p1, r1, bearing + 90, {units: 'kilometers'});
    const p2_l = turf.destination(p2, r2, bearing - 90, {units: 'kilometers'});
    const p2_r = turf.destination(p2, r2, bearing + 90, {units: 'kilometers'});
    return turf.polygon([[p1_l.geometry.coordinates, p2_l.geometry.coordinates, p2_r.geometry.coordinates, p1_r.geometry.coordinates, p1_l.geometry.coordinates]]);
}

function getSmoothLine(points, options = {}) {
    if (points.length < 3) return L.polyline(points, options);
    const turfLine = turf.lineString(points.map(p => [p[1], p[0]]));
    const curved = turf.bezierSpline(turfLine, { resolution: 5000, sharpness: 0.85 });
    return L.geoJSON(curved, { style: options });
}

function createPopupContent(data, type) {
    const timeValue = data.datetime || data.time || 'N/A';
    let header = type === 'current' ? ' 實時位置 ' : (type === 'forecast' ? ' 預報位置' : ' 過去位置');
    const timeLabel = (type === 'past' || type === 'current') ? `時間: ${timeValue}` : `預報時效: +${data.f_time}h`;
    return `<div class="popup-title">${header}</div><div class="popup-item"> ${timeLabel}</div><div class="popup-item"> 位置: ${data.lat.toFixed(1)}°N, ${data.lng.toFixed(1)}°E</div><div class="popup-item"> 強度: ${intensityNames[data.intensity] || data.intensity}</div><div class="popup-item"> 近中心最大風速: ${data.wind || '--'} kph</div><div class="popup-item"> 中心氣壓: ${data['minimum central pressure'] || '--'} hPa</div>`;
}

function drawAlertCircles(layer) {
    const center = turf.point([MACAO_COORDS[1], MACAO_COORDS[0]]);
    const starIcon = L.divIcon({ html: '<div style="color: #E64A19; font-size: 24px; text-shadow: 0 0 3px rgba(0,0,0,0.5);">★</div>', className: 'circle-label', iconSize: [24, 24], iconAnchor: [12, 12] });
    L.marker(MACAO_COORDS, { icon: starIcon, zIndexOffset: 1000 }).addTo(layer);
    ALERT_CIRCLES.forEach(circle => {
        L.geoJSON(turf.circle(center, circle.r, { units: 'kilometers' }), { style: { color: circle.color, weight: 1.2, fillColor: 'transparent', dashArray: '5, 8', opacity: circle.opacity } }).addTo(layer);
        const labelPos = turf.destination(center, circle.r, 180, { units: 'kilometers' });
        L.marker([labelPos.geometry.coordinates[1], labelPos.geometry.coordinates[0]], { icon: L.divIcon({ html: `<div style="color: ${circle.color}; font-weight: bold; font-size: 11px; white-space: nowrap; opacity: ${Math.min(1, circle.opacity + 0.3)}; text-shadow: 1px 1px 1px white;">${circle.r}km</div>`, className: 'circle-label', iconSize: [60, 20], iconAnchor: [30, -2] }) }).addTo(layer);
    });
}

/**
 * 繪製單個熱帶氣旋
 * @param {string} tcId 氣旋ID
 * @returns {Array} 該氣旋所有坐標點，用於邊界計算
 */
async function drawSingleTC(tcId) {
    try {
        const [pRes, fRes] = await Promise.all([
            fetch(`past_track_${tcId}.csv`).catch(()=>({text:()=>""})), 
            fetch(`forecast_track_${tcId}.csv`).catch(()=>({text:()=>""}))
        ]);
        const pastData = parseCSV(await pRes.text());
        const forecastData = parseCSV(await fRes.text());
        if(pastData.length === 0) return [];

        const latestPoint = pastData[pastData.length - 1];
        let coneParts = [];
        let prevPt = turf.point([latestPoint.lng, latestPoint.lat]);
        let prevR = 0;
        forecastData.forEach((d) => {
            let currPt = turf.point([d.lng, d.lat]), currR = (d.f_time / 24) * 100;
            if (currR > 0) coneParts.push(turf.circle(currPt, currR, {units: 'kilometers'}));
            coneParts.push(getSegmentSector(prevPt, prevR, currPt, currR));
            prevPt = currPt; prevR = currR;
        });
        if(coneParts.length > 0) {
            let combined = coneParts[0];
            for (let i = 1; i < coneParts.length; i++) { 
                combined = turf.union(combined, coneParts[i]); 
            }
            L.geoJSON(combined, { 
                style: { color: '#e67e22', weight: 1, dashArray: '5, 5', fillColor: '#f1c40f', fillOpacity: 0.12 } 
            }).addTo(trackLayer);
        }

        // 過去路徑
        L.polyline(pastData.map(d => [d.lat, d.lng]), { color: '#32CD32', weight: 4 }).addTo(trackLayer);

        // 預報路徑
        let fPath = [[latestPoint.lat, latestPoint.lng]];
        forecastData.forEach(d => fPath.push([d.lat, d.lng]));
        getSmoothLine(fPath, { color: '#3498db', weight: 3, dashArray: '8, 8' }).addTo(trackLayer);

        // 過去點位
        pastData.slice(0, -1).forEach(d => 
            L.circleMarker([d.lat, d.lng], { 
                radius: 5, fillColor: intensityColors[d.intensity] || intensityColors.default, 
                color: "#444", weight: 1, fillOpacity: 1 
            }).addTo(trackLayer).bindPopup(createPopupContent(d, 'past'))
        );

        // 實時位置
        L.circleMarker([latestPoint.lat, latestPoint.lng], { 
            radius: 8, fillColor: intensityColors[latestPoint.intensity] || intensityColors.default, 
            color: "#000", weight: 2.5, fillOpacity: 1 
        }).addTo(trackLayer).bindPopup(createPopupContent(latestPoint, 'current')).bringToFront();

        // 預報點位
        forecastData.forEach(d => 
            L.circleMarker([d.lat, d.lng], { 
                radius: 5, fillColor: intensityColors[d.intensity] || intensityColors.default, 
                color: "#333", weight: 1, fillOpacity: 0.8 
            }).addTo(trackLayer).bindPopup(createPopupContent(d, 'forecast'))
        );

        // 返回所有點用於邊界計算
        return pastData.map(d=>[d.lat, d.lng]).concat(fPath);
    } catch (e) {
        console.error(`加載熱帶氣旋 ${tcId} 失敗:`, e);
        return [];
    }
}

async function init() {
    trackLayer.clearLayers();
    drawAlertCircles(trackLayer);
    const target = document.getElementById('tc-selector').value;
    
    // 按鈕顯示邏輯：單個氣旋時顯示預報圖和PDF按鈕，全部模式隱藏
    const forecastBtn = document.getElementById('forecast-btn');
    const tcpBtn = document.getElementById('tcp-btn');
    if (forecastBtn) {
        forecastBtn.style.display = target === 'all' ? 'none' : 'inline-block';
    }
    if (tcpBtn) {
        tcpBtn.style.display = target === 'all' ? 'none' : 'inline-block';
    }

    let allBounds = []; // 收集所有氣旋的坐標用於自動縮放
    
    try {
        // 根據選項決定繪製單個還是全部
        const tcIds = target === 'all' ? TC_LIST : [target];
        
        for (const tcId of tcIds) {
            const points = await drawSingleTC(tcId);
            if (points.length > 0) {
                allBounds = allBounds.concat(points);
            }
        }
        
        // 自動適配視圖
        if (allBounds.length > 0) {
            map.fitBounds(allBounds, { padding: [50, 50] });
        }
    } catch (e) { 
        console.error("數據加載失敗:", e); 
    }
}
init();

var apiData = {};
var mapFrames = [];
var animationPosition = 0;
var animationTimer = false;
var currentLayer = null;
var isLoading = false;
var layerCache = {};
var radarVisible = false;
var satVisible = false; 

function formatTime(timestamp) { 
    return new Date(timestamp * 1000).toLocaleTimeString('zh-HK', { 
        hour: '2-digit', minute: '2-digit', hour12: false 
    }); 
}

function createRadarLayer(frame) { 
    return new L.TileLayer(apiData.host + frame.path + '/256/{z}/{x}/{y}/2/1_1.png', { 
        tileSize: 256, opacity: 0.001, maxNativeZoom: 7, maxZoom: 16 
    }); 
}

function stop() { 
    if (animationTimer) { 
        clearTimeout(animationTimer); 
        animationTimer = false; 
        document.getElementById("playBtn").innerHTML = "▶"; 
        return true; 
    } 
    return false; 
}

function play() { 
    animationTimer = true; 
    document.getElementById("playBtn").innerHTML = "⏸"; 
    showFrame(animationPosition + 1); 
}

function playStop() { if (!stop()) play(); }

function updateTimestamp(frame) { 
    document.getElementById("timestamp").innerHTML = formatTime(frame.time); 
}

function showFrame(position) {
    if (isLoading || mapFrames.length === 0) return;
    
    position = (position + mapFrames.length) % mapFrames.length;
    var frame = mapFrames[position];
    updateTimestamp(frame);

    if (typeof updateSatelliteLayer === 'function') {
        updateSatelliteLayer(frame);
    }

    var oldLayer = currentLayer;
    
    if (layerCache[position]) {
        if (oldLayer) oldLayer.setOpacity(0);

        var targetOpacity = (satVisible || !radarVisible) ? 0 : 0.8;
        layerCache[position].setOpacity(targetOpacity);
        
        currentLayer = layerCache[position];
        animationPosition = position;
        if (animationTimer) animationTimer = setTimeout(play, 500);
        return;
    }
    
    isLoading = true;
    var newLayer = createRadarLayer(frame);
    newLayer.on('load', function() {
        var targetOpacity = (satVisible || !radarVisible) ? 0 : 0.8;
        newLayer.setOpacity(targetOpacity);
        
        if (oldLayer) oldLayer.setOpacity(0);
        layerCache[position] = newLayer;
        currentLayer = newLayer;
        animationPosition = position;
        isLoading = false;
        if (animationTimer) animationTimer = setTimeout(play, 500);
    });
    newLayer.addTo(map);
}

function getGibsTime(timestamp) {
    var d = new Date((timestamp - 5400) * 1000); 
    var minutes = Math.floor(d.getUTCMinutes() / 10) * 10;
    d.setUTCMinutes(minutes);
    d.setUTCSeconds(0);
    return d.toISOString().split('.')[0] + 'Z'; 
}

var satLayerCache = {};
var currentSatLayer = null;

function updateSatelliteLayer(frame) {
    if (!satVisible || !frame) return;
    var exactTimeStr = getGibsTime(frame.time);
    
    if (satLayerCache[exactTimeStr]) {
        if (currentSatLayer && currentSatLayer !== satLayerCache[exactTimeStr]) {
            currentSatLayer.setOpacity(0);
        }
        satLayerCache[exactTimeStr].setOpacity(0.75);
        currentSatLayer = satLayerCache[exactTimeStr];
    } else {
        var himawariWorldview = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/' +
            'Himawari_AHI_Band13_Clean_Infrared/default/' +
            '{time}/GoogleMapsCompatible_Level6/{z}/{y}/{x}.png', {
            time: exactTimeStr, 
            tileSize: 256,
            transparent: true,
            opacity: 0.75,
            attribution: 'Imagery &copy; NASA GIBS / JMA',
            maxNativeZoom: 6,
            maxZoom: 18,
            zIndex: 10,
            keepBuffer: 4,
            updateWhenIdle: false,
            crossOrigin: true
        });
        
        himawariWorldview.addTo(map);
        satLayerCache[exactTimeStr] = himawariWorldview;
        
        if (currentSatLayer) { currentSatLayer.setOpacity(0); }
        currentSatLayer = himawariWorldview;
    }
}

function handleWeatherLayerChange(value) {
    stop();
    radarVisible = false;
    satVisible = false;

    document.getElementById('radar-ui-container').style.display = 'none';

    if (currentLayer) { currentLayer.setOpacity(0); }
    if (currentSatLayer) { currentSatLayer.setOpacity(0); currentSatLayer = null; }

    Object.values(satLayerCache).forEach(layer => { if (map.hasLayer(layer)) map.removeLayer(layer); });
    satLayerCache = {};

    var legendSubpanel = document.getElementById('radar-legend-subpanel');

    if (value === 'radar') {
        radarVisible = true;
        legendSubpanel.style.display = 'block'; 
        document.getElementById('radar-ui-container').style.display = 'block';
        loadOrShowData();
    } 
    else if (value === 'satellite') {
        satVisible = true;
        legendSubpanel.style.display = 'none';  
        document.getElementById('radar-ui-container').style.display = 'block';
        loadOrShowData();
    }
}

function loadOrShowData() {
    if (mapFrames.length === 0) {
        var apiRequest = new XMLHttpRequest();
        apiRequest.open("GET", "https://api.rainviewer.com/public/weather-maps.json", true);
        apiRequest.onload = function() {
            if (apiRequest.status >= 200 && apiRequest.status < 400) {
                apiData = JSON.parse(apiRequest.response);
                mapFrames = apiData.radar.past; 
                animationPosition = mapFrames.length - 1;
                showFrame(animationPosition);
            }
        };
        apiRequest.send();
    } else {
        showFrame(animationPosition);
    }
}
</script>
