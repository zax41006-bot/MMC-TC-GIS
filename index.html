<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <title>MMC 熱帶氣旋預報GIS（測試版）</title>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://unpkg.com/leaflet/dist/leaflet.css" rel="stylesheet"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        :root { --panel-bg: rgba(255, 255, 255, 0.95); --accent-color: #2c3e50; }
        body { margin: 0; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; overflow: hidden; }

        .header {
            position: absolute; top: 0; left: 0; right: 0; height: 50px;
            background: var(--accent-color); color: white;
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            z-index: 1100; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .img-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 15px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .img-btn:hover { background: #d35400; }

        #tc-selector { background: #34495e; color: white; border: 1px solid #7f8c8d; padding: 4px 8px; border-radius: 4px; cursor: pointer; }

        #mapid { position: absolute; top: 50px; left: 0; bottom: 0; right: 0; background: #aad3df; }
        .leaflet-top.leaflet-left { top: 60px; }

        .professional-legend {
            position: absolute; bottom: 20px; right: 10px;
            background: var(--panel-bg); padding: 12px; border-radius: 8px;
            z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.15); border: 1px solid #ddd; width: 210px;
        }
        .legend-title { font-weight: bold; border-bottom: 2px solid #eee; margin-bottom: 8px; padding-bottom: 4px; font-size: 13px; color: #333; }
        .legend-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; font-size: 11px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #444; flex-shrink: 0; }
        .line { width: 25px; height: 3px; flex-shrink: 0; }
        .box { width: 14px; height: 14px; border: 1px dashed #e67e22; background: rgba(241,196,15,0.15); flex-shrink: 0; }

        .popup-title { font-weight: bold; border-bottom: 1px solid #ccc; margin-bottom: 5px; color: #d35400; padding-bottom: 2px; }
        .popup-item { margin: 3px 0; font-family: 'Consolas', monospace; font-size: 12px; }

        #img-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #img-overlay img {
            max-width: 95%;
            max-height: 90%;
            border: 3px solid white;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .close-btn {
            position: absolute; top: 20px; right: 30px;
            color: white; font-size: 40px; cursor: pointer;
        }

        .circle-label {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
        }

        @media screen and (max-width: 768px) {
            .professional-legend {
                width: calc(100% - 40px);
                left: 10px; right: 10px; bottom: 15px;
                padding: 10px;
                display: flex; flex-wrap: wrap; 
                justify-content: space-between;
            }
            .legend-title { width: 100%; font-size: 11px; margin-top: 5px; }
            .legend-row { 
                width: 48%; 
                margin: 2px 0;
                font-size: 10px;
                gap: 5px;
            }
            .dot { width: 10px; height: 10px; }
            .line { width: 15px; }
            .header b { font-size: 14px; }
            #tc-selector { padding: 2px 4px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <b>🌀 MMC 熱帶氣旋預報GIS（測試版）</b>
        <button class="img-btn" onclick="toggleForecastImg()">預報路徑圖</button>
    </div>
    <select id="tc-selector" onchange="init()">
        <option value="A">黑格比</option>
    </select>
</div>

<div id="mapid"></div>

<div id="img-overlay" onclick="this.style.display='none'">
    <span class="close-btn">&times;</span>
    <img id="forecast-img-src" src="" alt="圖片版預報加載中...">
</div>

<div class="professional-legend">
    <div class="legend-title">路徑圖例</div>
    <div class="legend-row"><div class="dot" style="background:#fff; border: 2.5px solid #000; width:12px; height:12px;"></div> <b>實時位置</b></div>
    <div class="legend-row"><div class="line" style="background: #32CD32;"></div> 過去路徑</div>
    <div class="legend-row"><div class="line" style="border-top: 3px dashed #3498db;"></div> 預報路徑</div>
    <div class="legend-row"><div class="box"></div> 70% 誤差帶</div>
    
    <div class="legend-title">強度等級</div>
    <div class="legend-row"><div class="dot" style="background:#dcdcdc;"></div> LPA 低壓區</div>
    <div class="legend-row"><div class="dot" style="background:#eee8aa;"></div> TD 熱帶低氣壓</div>
    <div class="legend-row"><div class="dot" style="background:#3498db;"></div> TS 熱帶風暴</div>
    <div class="legend-row"><div class="dot" style="background:#2ecc71;"></div> STS 強烈熱帶風暴</div>
    <div class="legend-row"><div class="dot" style="background:#f1c40f;"></div> TY 颱風</div>
    <div class="legend-row"><div class="dot" style="background:#e67e22;"></div> STY 強颱風</div>
    <div class="legend-row"><div class="dot" style="background:#9b59b6;"></div> SUTY 超強颱風</div>
</div>

<script>
const intensityColors = {
    "LPA": "#dcdcdc", "EX": "#dcdcdc", "TD": "#eee8aa", "TS": "#3498db", 
    "STS": "#2ecc71", "TY": "#f1c40f", "STY": "#e67e22", "SUTY": "#9b59b6", "default": "#666"
};

const intensityNames = {
    "LPA": "低壓區", "TD": "熱帶低氣壓", "TS": "熱帶風暴", "STS": "強烈熱帶風暴",
    "TY": "颱風", "STY": "強颱風", "SUTY": "超強颱風", "EX": "溫帶氣旋"
};

// 澳門配置
const MACAO_COORDS = [22.17, 113.55]; // [lat, lng]
const ALERT_CIRCLES = [
    { r: 100, color: "#A0A0A0", opacity: 0.3 },
    { r: 200, color: "#808080", opacity: 0.4 },
    { r: 400, color: "#808080", opacity: 0.5 },
    { r: 600, color: "#A0A0A0", opacity: 0.6 },
    { r: 800, color: "#FF4D4D", opacity: 0.7 }
];

var map = L.map('mapid', { zoomControl: false }).setView([18.0, 135.0], 5);
L.control.zoom({ position: 'topleft' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
let trackLayer = L.layerGroup().addTo(map);

function toggleForecastImg() {
    const target = document.getElementById('tc-selector').value;
    const overlay = document.getElementById('img-overlay');
    const img = document.getElementById('forecast-img-src');
    img.src = `TC_forecast_${target}.png?t=${new Date().getTime()}`;
    overlay.style.display = 'flex';
}

function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
    return lines.slice(1).map(line => {
        const values = line.split(',');
        let obj = {};
        headers.forEach((h, i) => {
            let val = values[i] ? values[i].trim() : "";
            if(['lat', 'lng', 'lon', 'f_time', 'wind', 'minimum central pressure'].includes(h)) {
                val = parseFloat(val);
            }
            obj[h] = val;
        });
        if (obj.lon && !obj.lng) obj.lng = obj.lon;
        return obj;
    });
}

function getSegmentSector(p1, r1, p2, r2) {
    const bearing = turf.bearing(p1, p2);
    const p1_l = turf.destination(p1, r1, bearing - 90, {units: 'kilometers'});
    const p1_r = turf.destination(p1, r1, bearing + 90, {units: 'kilometers'});
    const p2_l = turf.destination(p2, r2, bearing - 90, {units: 'kilometers'});
    const p2_r = turf.destination(p2, r2, bearing + 90, {units: 'kilometers'});
    return turf.polygon([[
        p1_l.geometry.coordinates, p2_l.geometry.coordinates,
        p2_r.geometry.coordinates, p1_r.geometry.coordinates, p1_l.geometry.coordinates
    ]]);
}

function getSmoothLine(points, options = {}) {
    if (points.length < 3) return L.polyline(points, options);
    const turfLine = turf.lineString(points.map(p => [p[1], p[0]]));
    const curved = turf.bezierSpline(turfLine, { resolution: 5000, sharpness: 0.85 });
    return L.geoJSON(curved, { style: options });
}

function createPopupContent(data, type) {
    const timeValue = data.datetime || data.time || 'N/A';
    let header = ' 過去位置';
    if (type === 'current') header = ' 實時位置 ';
    if (type === 'forecast') header = ' 預報位置';

    const timeLabel = (type === 'past' || type === 'current') ? `時間: ${timeValue}` : `預報時效: +${data.f_time}h`;
    const wind = data['wind'] !== undefined ? data['wind'] : '--';
    const pres = data['minimum central pressure'] !== undefined ? data['minimum central pressure'] : '--';

    return `
        <div class="popup-title">${header}</div>
        <div class="popup-item"> ${timeLabel}</div>
        <div class="popup-item"> 位置: ${data.lat.toFixed(1)}°N, ${data.lng.toFixed(1)}°E</div>
        <div class="popup-item"> 強度: ${intensityNames[data.intensity] || data.intensity}</div>
        <div class="popup-item"> 近中心最大風速: ${wind} kph</div>
        <div class="popup-item"> 中心氣壓: ${pres} hPa</div>
    `;
}

// 繪製警戒圓函數
function drawAlertCircles(layer) {
    const center = turf.point([MACAO_COORDS[1], MACAO_COORDS[0]]);
    
    // 澳門星號
    const starIcon = L.divIcon({
        html: '<div style="color: #E64A19; font-size: 24px; text-shadow: 0 0 3px rgba(0,0,0,0.5);">★</div>',
        className: 'circle-label',
        iconSize: [24, 24],
        iconAnchor: [12, 12]
    });
    L.marker(MACAO_COORDS, { icon: starIcon, zIndexOffset: 1000 }).addTo(layer);

    ALERT_CIRCLES.forEach(circle => {
        // 繪製虛線圓圈
        const circleGeo = turf.circle(center, circle.r, { units: 'kilometers' });
        L.geoJSON(circleGeo, {
            style: {
                color: circle.color,
                weight: 1.2,
                fillColor: 'transparent',
                dashArray: '5, 8',
                opacity: circle.opacity
            }
        }).addTo(layer);

        // 在圓圈正南側（180度）標註文字
        const labelPos = turf.destination(center, circle.r, 180, { units: 'kilometers' });
        const labelCoords = [labelPos.geometry.coordinates[1], labelPos.geometry.coordinates[0]];

        const textIcon = L.divIcon({
            html: `<div style="color: ${circle.color}; font-weight: bold; font-size: 11px; white-space: nowrap; opacity: ${Math.min(1, circle.opacity + 0.3)}; text-shadow: 1px 1px 1px white;">${circle.r}km</div>`,
            className: 'circle-label',
            iconSize: [60, 20],
            iconAnchor: [30, -2]
        });
        L.marker(labelCoords, { icon: textIcon }).addTo(layer);
    });
}

async function init() {
    trackLayer.clearLayers();
    
    // 初始化時先畫警戒圓
    drawAlertCircles(trackLayer);

    const target = document.getElementById('tc-selector').value;
    try {
        const [pRes, fRes] = await Promise.all([
            fetch(`past_track_${target}.csv`),
            fetch(`forecast_track_${target}.csv`)
        ]);
        const pastData = parseCSV(await pRes.text());
        const forecastData = parseCSV(await fRes.text());
        if(pastData.length === 0) return;

        const latestPoint = pastData[pastData.length - 1];
        const historicalPoints = pastData.slice(0, pastData.length - 1);

        let coneParts = [];
        let prevPt = turf.point([latestPoint.lng, latestPoint.lat]);
        let prevR = 0;
        forecastData.forEach((d) => {
            let currPt = turf.point([d.lng, d.lat]);
            let currR = (d.f_time / 24) * 100;
            if (currR > 0) coneParts.push(turf.circle(currPt, currR, {units: 'kilometers'}));
            coneParts.push(getSegmentSector(prevPt, prevR, currPt, currR));
            prevPt = currPt; prevR = currR;
        });
        if(coneParts.length > 0) {
            let combined = coneParts[0];
            for (let i = 1; i < coneParts.length; i++) { combined = turf.union(combined, coneParts[i]); }
            L.geoJSON(combined, { style: { color: '#e67e22', weight: 1, dashArray: '5, 5', fillColor: '#f1c40f', fillOpacity: 0.12 } }).addTo(trackLayer);
        }

        const pPoints = pastData.map(d => [d.lat, d.lng]);
        L.polyline(pPoints, { color: '#32CD32', weight: 4 }).addTo(trackLayer);

        let fPath = [[latestPoint.lat, latestPoint.lng]];
        forecastData.forEach(d => fPath.push([d.lat, d.lng]));
        getSmoothLine(fPath, { color: '#3498db', weight: 3, dashArray: '8, 8' }).addTo(trackLayer);

        historicalPoints.forEach((d) => {
            L.circleMarker([d.lat, d.lng], { 
                radius: 5, 
                fillColor: intensityColors[d.intensity] || intensityColors.default, 
                color: "#444", 
                weight: 1, 
                fillOpacity: 1 
            }).addTo(trackLayer).bindPopup(createPopupContent(d, 'past'));
        });

        L.circleMarker([latestPoint.lat, latestPoint.lng], { 
            radius: 8, 
            fillColor: intensityColors[latestPoint.intensity] || intensityColors.default, 
            color: "#000", 
            weight: 2.5, 
            fillOpacity: 1 
        }).addTo(trackLayer)
          .bindPopup(createPopupContent(latestPoint, 'current'))
          .bringToFront();

        forecastData.forEach(d => {
            L.circleMarker([d.lat, d.lng], { 
                radius: 5, 
                fillColor: intensityColors[d.intensity] || intensityColors.default, 
                color: "#333", 
                weight: 1, 
                fillOpacity: 0.8 
            }).addTo(trackLayer).bindPopup(createPopupContent(d, 'forecast'));
        });

        map.fitBounds(pPoints.concat(fPath), { padding: [50, 50] });
    } catch (e) { console.error("數據加載失敗:", e); }
}
init();
</script>
</body>
</html>
